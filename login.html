<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINAP</title>
    <link href='https://cdn.boxicons.com/3.0.6/fonts/basic/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="wrapper">
        <form action="">
            <i class="bx bx-education" id="logo"></i>
            <h1>SINAP</h1>
            <p>Sistema de identificación de necesidades y ajustes pedagógicos</p>
            <p class="frase">"Apoyando la inclusión y el aprendizaje accesible"</p>
        <div class="textfield">
            <input type="email" placeholder="Correo electrónico" required>
            <i class='bxr  bx-user-hexagon'></i> 
        </div>
        <div class="textfield">
            <input type="password" placeholder="Contraseña" required>
            <i class='bxr  bx-lock'></i> 
        </div>

        <div class="recordar">
            <input type="checkbox">
            <label>Recordarme</label>
            <a href="https://media.tenor.com/UTCcnL7uoNgAAAAM/cat-gato.gif">¿Olvidaste tu Contraseña?</a><br>
        </div>
        <button type="submit" class="btn" onclick="window.location.href='index.html'">Ingresar</button>
        <div class="registrarse">
            <p>¿Volver al registro de asistencia?</p><a href="index.html">Haz click aqui</a>
        </form>
    </div>
</body>
</html>
