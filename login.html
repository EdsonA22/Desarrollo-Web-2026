<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINAP</title>

    <link href='https://cdn.boxicons.com/3.0.6/fonts/basic/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="login.css">
</head>

<body>
<div class="wrapper">
    <form id="loginForm">
        <i class="bx bx-education" id="logo"></i>
        <h1>SINAP</h1>
        <p>Sistema de identificación de necesidades y ajustes pedagógicos</p>
        <p class="frase">"Apoyando la inclusión y el aprendizaje accesible"</p>

        <div class="textfield">
            <input type="email" id="correo" placeholder="Correo electrónico" required>
            <i class='bxr bx-user-hexagon'></i> 
        </div>

        <div class="textfield">
            <input type="password" id="password" placeholder="Contraseña" required>
            <i class='bxr bx-lock'></i> 
        </div>

        <div class="recordar">
            <input type="checkbox">
            <label>Recordarme</label>
        </div>

        <button type="submit" class="btn">Ingresar</button>

        <div class="registrarse">
            <p>¿Volver al registro de asistencia?</p>
            <a href="index.html">Haz click aqui</a>
        </div>
    </form>
</div>

//fire base
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ⚠️ AQUI ESTAN LOS DATOS DEL FIREBASE QUE CREE
    const firebaseConfig = {
        apiKey: "AIzaSyBAj-0ii_ok1P50SkMLklKGC2oMuQoJd1o",
        authDomain: "sinap-6dfb5.firebaseapp.com",
        projectId: "sinap-6dfb5",
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Login
    const form = document.getElementById("loginForm");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const correo = document.getElementById("correo").value;
        const password = document.getElementById("password").value;

        try {
            const userCredential = await signInWithEmailAndPassword(auth, correo, password);
            alert("Inicio de sesión exitoso");

            // Redirigir
            window.location.href = "dashboard.html";

        } catch (error) {
            alert("Error: " + error.message);
        }
    });
</script>

</body>
</html>
