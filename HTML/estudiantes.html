<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SINAP - Estudiantes</title>
    <link rel="stylesheet" href="../CSS/index.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">S</div>
          <div>
            <h1>SINAP</h1>
            <p>Ajustes pedagogicos</p>
          </div>
        </div>
        <div class="user-card">
          <strong id="sessionName">Admin Sistema</strong>
          <p>Base de datos</p>
        </div>
        <nav class="nav" aria-label="Navegacion principal">
          <a class="active" href="estudiantes.html">Estudiantes</a>
          <a href="docentes.html">Docentes</a>
          <a href="reportes.html">Reportes</a>
        </nav>
        <button class="logout" type="button" id="logoutButton">
          Cerrar sesion
        </button>
      </aside>

      <main class="main">
        <header class="page-header">
          <div>
            <h2>Base de datos de estudiantes</h2>
            <p class="muted">
              Consulta y administra los perfiles registrados en el prototipo.
            </p>
          </div>
          <a class="secondary-btn" href="index.html">Nuevo registro</a>
        </header>

        <section class="card">
          <label for="search">Buscar estudiante</label>
          <input id="search" placeholder="Nombre, correo o carrera" />
          <div style="overflow-x: auto; margin-top: 16px">
            <table>
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Carrera</th>
                  <th>Necesidades</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="studentTable"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="../Conexion/app.js"></script>
    <script src="../Conexion/estudianteslog.js"></script>
  </body>
</html>
